<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>AetherRing — Health Intelligence</title>
  <meta name="description" content="Premium Colmi Ring R10 health platform with AI-powered sleep, recovery, heart, and activity intelligence." />
  <meta name="theme-color" content="#0c0c0e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── TOP BAR ── -->
<header class="topbar">
  <div class="topbar-left">
    <span id="topbar-clock" class="topbar-clock">12:00</span>
    <span id="topbar-status-dot" class="status-dot dot-disconnected" title="Not connected"></span>
    <span id="topbar-battery" class="topbar-battery"></span>
  </div>
  <div class="topbar-center">
    <span class="topbar-logo">⬡ AetherRing</span>
  </div>
  <div class="topbar-right">
    <button id="btn-sync" class="topbar-btn" title="Sync data">↻</button>
    <button id="btn-theme" class="topbar-btn" title="Toggle theme"><span id="theme-icon">☀️</span></button>
  </div>
</header>

<!-- ── SCREEN AREA ── -->
<main class="screens-host">
  <div class="screen-container screen-active" data-screen="home"></div>
  <div class="screen-container" data-screen="sleep" style="display:none"></div>
  <div class="screen-container" data-screen="recovery" style="display:none"></div>
  <div class="screen-container" data-screen="activity" style="display:none"></div>
  <div class="screen-container" data-screen="body" style="display:none"></div>
  <div class="screen-container" data-screen="coach" style="display:none"></div>
</main>

<!-- ── TAB BAR ── -->
<nav class="tab-bar" role="navigation" aria-label="Main navigation">
  <button class="tab active" data-tab="home" id="tab-home" aria-label="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Home</span>
  </button>
  <button class="tab" data-tab="sleep" id="tab-sleep" aria-label="Sleep">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <span>Sleep</span>
  </button>
  <button class="tab" data-tab="recovery" id="tab-recovery" aria-label="Recovery">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    <span>Heart</span>
  </button>
  <button class="tab" data-tab="activity" id="tab-activity" aria-label="Activity">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <span>Activity</span>
  </button>
  <button class="tab" data-tab="body" id="tab-body" aria-label="Body">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
    <span>Body</span>
  </button>
  <button class="tab" data-tab="coach" id="tab-coach" aria-label="AI Coach">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <span>Coach</span>
  </button>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
