<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>AetherRing — Health Intelligence</title>
  <meta name="description" content="Premium Colmi Ring R10 health platform with AI-powered sleep, recovery, heart, and activity intelligence." />
  <meta name="theme-color" content="#000000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── TOP BAR ── -->
<header class="topbar">
  <div class="topbar-left">
    <span id="topbar-clock" class="topbar-clock">12:00</span>
    <span id="topbar-status-dot" class="status-dot dot-disconnected" title="Not connected"></span>
    <span id="topbar-battery" class="topbar-battery"></span>
  </div>
  <div class="topbar-center">
    <span class="topbar-logo">AetherRing</span>
  </div>
  <div class="topbar-right">
    <button id="btn-sync" class="topbar-btn" title="Sync data">↻</button>
    <!-- AI Coach icon moved to top bar -->
    <button class="topbar-btn" id="btn-coach" title="AI Coach">✨</button>
    <button id="btn-theme" class="topbar-btn" title="Toggle theme"><span id="theme-icon">🌙</span></button>
  </div>
</header>

<!-- ── SCREEN AREA ── -->
<main class="screens-host">
  <div class="screen-container screen-active" data-screen="today"></div>
  <div class="screen-container" data-screen="readiness" style="display:none"></div>
  <div class="screen-container" data-screen="sleep" style="display:none"></div>
  <div class="screen-container" data-screen="activity" style="display:none"></div>
  <div class="screen-container" data-screen="resilience" style="display:none"></div>
  <div class="screen-container" data-screen="coach" style="display:none"></div>
</main>

<!-- ── TAB BAR ── -->
<nav class="tab-bar" role="navigation" aria-label="Main navigation">
  <button class="tab active" data-tab="today" id="tab-today" aria-label="Today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    <span>Today</span>
  </button>
  <button class="tab" data-tab="readiness" id="tab-readiness" aria-label="Readiness">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
    <span>Readiness</span>
  </button>
  <button class="tab" data-tab="sleep" id="tab-sleep" aria-label="Sleep">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <span>Sleep</span>
  </button>
  <button class="tab" data-tab="activity" id="tab-activity" aria-label="Activity">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <span>Activity</span>
  </button>
  <button class="tab" data-tab="resilience" id="tab-resilience" aria-label="Resilience">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <span>Resilience</span>
  </button>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
